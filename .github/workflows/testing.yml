name: Run Tests

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: npx mocha "./testing-1/tests/**/*.test.cjs"
          

      - name: Verify installation
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test